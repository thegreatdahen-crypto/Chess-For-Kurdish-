<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شەترەنجی پڕۆفیشناڵی کوردی</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.0/assets/chessboard.css">
    
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Tahoma', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
            user-select: none; 
        }
        h2 { margin-bottom: 10px; color: #e94560; text-align: center; font-size: 22px; }
        
        .controls {
            width: 100%; max-width: 400px; display: flex;
            justify-content: space-between; align-items: center;
            margin-bottom: 15px; background-color: #16213e;
            padding: 12px; border-radius: 8px; box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .controls label { font-weight: bold; color: #4CAF50; font-size: 15px;}
        select {
            background-color: #0f3460; color: white; border: 1px solid #e94560;
            padding: 6px; border-radius: 5px; font-family: inherit; font-size: 14px;
            outline: none; cursor: pointer;
        }

        #kurdish-analysis {
            background-color: #16213e; padding: 15px; width: 100%;
            max-width: 400px; border-radius: 10px; margin-bottom: 15px;
            text-align: center; font-size: 16px; line-height: 1.6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); min-height: 75px;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; border-bottom: 5px solid #81b64c;
            transition: border-color 0.4s ease;
        }

        .board-container {
            width: 100%; max-width: 400px;
            aspect-ratio: 1 / 1; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-radius: 5px;
            overflow: hidden;
        }

        .btn {
            background-color: #e94560; color: white; border: none;
            padding: 14px 20px; margin-top: 20px; font-size: 16px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            width: 100%; max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        .btn:active { background-color: #c81d3f; transform: translateY(2px); }
    </style>
</head>
<body>

    <h2>شەترەنجی پڕۆفیشناڵی کوردی ♞</h2>

    <div class="controls">
        <label for="difficulty">ئاستی ڕکابەر:</label>
        <select id="difficulty">
            <option value="1">١: سەرەتایی</option>
            <option value="2" selected>٢: مامناوەند</option>
            <option value="3">٣: قورس</option>
        </select>
    </div>

    <div id="kurdish-analysis">بەخێربێیت! یەکەم جووڵەی خۆت بکە بۆ ئەوەی شیکردنەوەت بۆ بکەم. ♟️</div>

    <div class="board-container" id="board"></div>

    <button class="btn" onclick="restartGame()">یارییەکی نوێ (Restart) 🔄</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script type="module">
        import { Chessboard, COLOR, INPUT_EVENT_TYPE } from "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.0/src/cm-chessboard/Chessboard.js";

        var game = new Chess();
        var analysisBox = document.getElementById('kurdish-analysis');
        
        // خاڵی پارچەکان: سەرباز=10، ئەسپ/فیل=30، قەڵا=50، وەزیر=90
        var pieceValues = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
        var board; 

        function provideFeedback(htmlText, color) {
            analysisBox.innerHTML = htmlText;
            analysisBox.style.borderBottomColor = color;
        }

        // فەنکشنی ژماردنی خاڵەکانی ئێستای سەر بۆردەکە
        function evaluateBoardScore() {
            var total = 0;
            var b = game.board();
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    if (b[i][j]) {
                        var val = pieceValues[b[i][j].type];
                        total += b[i][j].color === 'w' ? val : -val;
                    }
                }
            }
            return total;
        }

        // 💡 فەنکشنی نوێ و زیرەک: پێشبینیکردنی خراپترین سیناریۆ بۆ یاریزان دوای جووڵەکەی
        function getPredictedScoreAfterBotResponse() {
            // ئەگەر یاریزان بۆتەکەی کش مات کردبێت
            if (game.in_checkmate()) return 9999; 
            if (game.in_draw() || game.in_stalemate()) return 0;

            var possibleBotMoves = game.moves();
            var worstCaseScore = 9999; // ئێمە (سپی) دەمانەوێت خاڵەکانمان بەرز بێت، بۆیە خراپترین واتا کەمترین ژمارە

            // تاقیکردنەوەی هەموو جووڵەکانی بۆتەکە بۆ بینینی ئەوەی کامەیان زەرەرمان پێ دەگەیەنێت
            for (var i = 0; i < possibleBotMoves.length; i++) {
                game.move(possibleBotMoves[i]);
                var score = evaluateBoardScore();
                if (score < worstCaseScore) {
                    worstCaseScore = score;
                }
                game.undo(); // گەڕاندنەوەی بۆردەکە وەک خۆی
            }
            return worstCaseScore;
        }

        // شیکردنەوەی جووڵەکە بە بەکارهێنانی پێشبینییەکان
        function analyzePlayerMove(scoreBeforeMove) {
            if (game.in_checkmate()) {
                return provideFeedback("🏆 <b>کش مات!</b><br> یارییەکەت بردەوە، ئافەرین.", "#FFD700");
            } else if (game.in_check()) {
                return provideFeedback("⚠️ <b>کش!</b><br> پاشای بەرامبەرت خستە مەترسییەوە.", "#f3ae16");
            }

            // لێرەدا خاڵە ڕاستەقینەکە دەهێنین (دوای ئەوەی بۆتەکە جووڵەی خۆی دەکات)
            var expectedScoreAfterBot = getPredictedScoreAfterBotResponse();
            var scoreDiff = expectedScoreAfterBot - scoreBeforeMove; 

            // ئەگەر ٣٠ خاڵ یان زیاتر لەدەست بدەین (واتا ئەسپێک، فیلێک، یان وەزیرێکمان بەخۆڕایی دانابێت)
            if (scoreDiff <= -25) {
                provideFeedback("❌ <b style='color:#ca3431'>هەڵەی گەورە (Blunder ??):</b><br> پارچەیەکی گرنگت خستە مەترسییەوە یان بەخۆڕایی داتنا!", "#ca3431");
            } 
            // ئەگەر ١٠ بۆ ٢٥ خاڵ لەدەست بدەین (سەربازێکمان دابێت، یان پێگەمان زۆر خراپ بووبێت)
            else if (scoreDiff < -5 && scoreDiff > -25) {
                provideFeedback("❓ <b style='color:#e58f2a'>هەڵە (Mistake ?):</b><br> جووڵەیەکی لاواز بوو، سەربازێکت خستە مەترسییەوە.", "#e58f2a");
            } 
            else if (scoreDiff < 0 && scoreDiff >= -5) {
                provideFeedback("⁉️ <b style='color:#f3ae16'>نادروست (Inaccuracy ?!):</b><br> دەکرا جووڵەیەکی باشتر هەڵبژێریت.", "#f3ae16");
            } 
            else if (scoreDiff >= 0 && scoreDiff < 15) {
                provideFeedback("✔️ <b style='color:#81b64c'>جووڵەی باش (Good):</b><br> جووڵەیەکی سەلامەت و پارێزراوە.", "#81b64c");
            } 
            else if (scoreDiff >= 15 && scoreDiff < 40) {
                provideFeedback("🌟 <b style='color:#96bc4b'>باشترین جووڵە (Best Move ★):</b><br> یارییەکی زۆر ستراتیژی دەکەیت.", "#96bc4b");
            } 
            else if (scoreDiff >= 40 && scoreDiff < 70) {
                provideFeedback("‼️ <b style='color:#5c8bb0'>جووڵەی نایاب (Great Move !):</b><br> قازانجێکی زۆر گەورەت کرد بێ قوربانیدان!", "#5c8bb0");
            } 
            else if (scoreDiff >= 70) {
                provideFeedback("💎 <b style='color:#1baca6'>بلیمەتانە (Brilliant !!):</b><br> شاکارە! جووڵەیەکی بلیمەتانە و هێرشێکی کوشندە.", "#1baca6");
            }
        }

        // لۆجیکی بۆتەکە
        function makeBotMove() {
            var possibleMoves = game.moves({ verbose: true });
            if (possibleMoves.length === 0) return;

            var level = document.getElementById('difficulty').value;
            var bestMove = null;

            if (level === "1") {
                bestMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            } else if (level === "2") {
                bestMove = possibleMoves[0];
                var highestValue = -1;
                for (var i = 0; i < possibleMoves.length; i++) {
                    if (possibleMoves[i].captured) {
                        var val = pieceValues[possibleMoves[i].captured];
                        if (val > highestValue) { highestValue = val; bestMove = possibleMoves[i]; }
                    }
                }
                if(highestValue === -1) bestMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
            } else if (level === "3") {
                var bestValue = 9999; 
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i].san);
                    var boardValue = evaluateBoardScore();
                    game.undo();
                    if (boardValue < bestValue) {
                        bestValue = boardValue;
                        bestMove = possibleMoves[i];
                    }
                }
                if (!bestMove) bestMove = possibleMoves[0];
            }

            game.move(bestMove.san);
            board.setPosition(game.fen());

            if (game.in_checkmate()) {
                provideFeedback("💀 <b style='color:#ca3431'>دۆڕایت!</b><br> بۆتەکە کش ماتی کردیت.", "#ca3431");
            } else if (game.in_check()) {
                provideFeedback("⚠️ <b style='color:#e58f2a'>ئاگاداربە!</b><br> بۆتەکە کشی لێ کردیت.", "#e58f2a");
            } else if (game.in_draw()) {
                provideFeedback("🤝 <b>یەکسان بوون (Draw)!</b>", "#888888");
            }
        }

        function inputHandler(event) {
            if (event.type === INPUT_EVENT_TYPE.moveStart) {
                if (game.game_over() || game.turn() === 'b') {
                    return false;
                }
                return true;
            } else if (event.type === INPUT_EVENT_TYPE.moveDone) {
                // پێش ئەوەی جووڵەکە بکرێت، خاڵەکانی خۆمان دەژمێرین
                var scoreBefore = evaluateBoardScore();

                var move = game.move({
                    from: event.squareFrom,
                    to: event.squareTo,
                    promotion: 'q'
                });

                if (move === null) {
                    return false; 
                }

                // ناردنی خاڵە کۆنەکە بۆ بەراوردکردن بە داهاتوو
                analyzePlayerMove(scoreBefore);
                
                setTimeout(makeBotMove, 400);
                return true;
            }
        }

        board = new Chessboard(document.getElementById("board"), {
            position: game.fen(),
            assetsUrl: "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.0/assets/",
            style: {
                cssClass: "default",
                showCoordinates: true,
            },
            responsive: true 
        });

        board.enableMoveInput(inputHandler, COLOR.white);

        window.restartGame = function() {
            game.reset();
            board.setPosition(game.fen());
            provideFeedback("یارییەکی نوێ دەستی پێکرد. بەختێکی باش! ♟️", "#81b64c");
        }
    </script>
</body>
</html>
